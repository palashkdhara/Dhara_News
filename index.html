<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>শুধু খবর</title>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D32F2F">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    
    <!-- Hind Siliguri Font for Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Breaking News Ticker (populated dynamically from articles) -->
    <div class="breaking-news">
        <span class="breaking-label">ব্রেকিং:</span>
        <div class="ticker-wrapper">
            <div class="ticker-text" id="ticker-text"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <button class="menu-btn" aria-label="Menu">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
        </button>
        <div class="logo">শুধু খবর</div>
        <div class="header-right">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        </div>
    </header>

    <!-- Categories Navigation -->
    <nav class="categories">
        <ul class="category-list">
            <li class="active"><a href="#" data-category="প্রচ্ছদ">প্রচ্ছদ</a></li>
            <li><a href="#" data-category="রাজ্য">রাজ্য</a></li>
            <li><a href="#" data-category="দেশ">দেশ</a></li>
            <li><a href="#" data-category="বিনোদন">বিনোদন</a></li>
            <li><a href="#" data-category="খেলা">খেলা</a></li>
            <li><a href="#" data-category="বাণিজ্য">বাণিজ্য</a></li>
            <li><a href="#" data-category="প্রযুক্তি">প্রযুক্তি</a></li>
            <li><a href="#" data-category="যোগাযোগ">যোগাযোগ</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main>
        <div class="update-bar">
            <div id="last-updated" class="last-updated"></div>
        </div>
        
        <div id="loader" class="loader-container" style="display: none;">
            <div class="spinner"></div>
            <p>খবর লোড হচ্ছে...</p>
        </div>

        <div id="error-message" class="error-container" style="display: none;">
            <!-- Errors will be injected here -->
        </div>

        <div id="news-container" class="news-feed">
            <!-- News cards will be dynamically injected here -->
        </div>
        
        <!-- Bottom margin space for fixed nav -->
        <div style="height: 60px;"></div>
    </main>

    <!-- Article Detail Overlay (In-App Reader) -->
    <div id="article-overlay" class="article-overlay">
        <div class="overlay-header">
            <button id="overlay-back-btn" class="overlay-back-btn" aria-label="Back">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                <span>ফিরে যান</span>
            </button>
            <span id="overlay-source" class="overlay-source"></span>
        </div>
        <div class="overlay-body">
            <img id="overlay-img" class="overlay-img" src="" alt="News Image">
            <div class="overlay-content">
                <h1 id="overlay-title" class="overlay-title"></h1>
                <div id="overlay-meta" class="overlay-meta"></div>
                <p id="overlay-description" class="overlay-description"></p>
                <a id="overlay-link" class="overlay-read-more" href="#" target="_blank" rel="noopener">
                    🔗 মূল সংবাদ পড়ুন (বাহ্যিক লিঙ্ক)
                </a>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span>হোম</span>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
            </svg>
            <span>ভিডিও</span>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
            </svg>
            <span>সংরক্ষিত</span>
        </a>
    </nav>

    <script src="app.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.error('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
